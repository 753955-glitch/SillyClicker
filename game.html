<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Clicker ⚡</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #1e1e2f, #2c2c54);
        color: white;
        overflow: hidden;
    }

    #orb {
        font-size: 100px;
        cursor: pointer;
        position: relative;
    }

    #score, #eps {
        font-size: 24px;
        margin: 10px;
    }

    .upgrade {
        background: #444;
        padding: 10px;
        margin: 10px;
        display: inline-block;
        cursor: pointer;
        border-radius: 8px;
    }

    .upgrade:hover {
        background: #666;
    }

    .spark {
        position: absolute;
        color: yellow;
        font-size: 20px;
        pointer-events: none;
        animation: floatUp 0.6s ease-out forwards;
    }

    @keyframes floatUp {
        0% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        100% {
            opacity: 0;
            transform: translateY(-50px) scale(1.5);
        }
    }
</style>
</head>
<body>

<h1>Chaos Clicker ⚡</h1>

<div id="score">Chaos Energy: 0</div>
<div id="eps">Energy/sec: 0</div>

<div id="orb">⚡</div>

<h2>Upgrades</h2>

<div class="upgrade" onclick="buyClickPower()">
    Stronger Click (+1) - Cost: <span id="clickCost">25</span>
</div>

<div class="upgrade" onclick="buyGenerator()">
    Chaos Generator (+1/sec) - Cost: <span id="genCost">50</span>
</div>

<div class="upgrade" onclick="buyOverload()">
    Overload Boost (x2 passive) - Cost: <span id="overCost">200</span>
</div>

<script>
let energy = 0;
let clickPower = 1;
let generators = 0;
let passiveMultiplier = 1;

let clickCost = 25;
let genCost = 50;
let overCost = 200;

function getEPS() {
    return generators * passiveMultiplier;
}

function update() {
    document.getElementById("score").innerText = "Chaos Energy: " + Math.floor(energy);
    document.getElementById("eps").innerText = "Energy/sec: " + getEPS();
    document.getElementById("clickCost").innerText = clickCost;
    document.getElementById("genCost").innerText = genCost;
    document.getElementById("overCost").innerText = overCost;
}

// Spark effect
function createSpark(x, y) {
    let spark = document.createElement("div");
    spark.className = "spark";
    spark.innerText = "⚡";

    spark.style.left = x + "px";
    spark.style.top = y + "px";

    document.body.appendChild(spark);

    setTimeout(() => spark.remove(), 600);
}

// Clicking
document.getElementById("orb").onclick = (e) => {
    energy += clickPower;
    update();

    createSpark(e.clientX, e.clientY);
};

// Upgrades
function buyClickPower() {
    if (energy >= clickCost) {
        energy -= clickCost;
        clickPower++;
        clickCost = Math.floor(clickCost * 1.5);
        update();
    }
}

function buyGenerator() {
    if (energy >= genCost) {
        energy -= genCost;
        generators++;
        genCost = Math.floor(genCost * 1.6);
        update();
    }
}

function buyOverload() {
    if (energy >= overCost) {
        energy -= overCost;
        passiveMultiplier *= 2;
        overCost = Math.floor(overCost * 2);
        update();
    }
}

// Passive income loop
setInterval(() => {
    energy += getEPS();
    update();
}, 1000);

// Init
update();
</script>

</body>
</html>
