<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA GOOSE CLICKER: MEGA EDITION</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #ffa502;
            --accent: #2ed573;
            --bg: #1e2124;
            --card: #2f3542;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Left Side: The Main Stage */
        #click-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, #2f3542 0%, #121417 100%);
        }

        #goose {
            font-size: 180px;
            cursor: pointer;
            transition: transform 0.05s;
            z-index: 10;
        }

        #goose:active { transform: scale(0.85) rotate(5deg); }

        /* Right Side: The Massive Shop */
        #shop {
            width: 450px;
            background: #16191c;
            border-left: 2px solid #333;
            display: flex;
            flex-direction: column;
        }

        #shop-header {
            padding: 20px;
            background: var(--primary);
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #upgrade-list {
            flex: 1;
            overflow-y: scroll; /* Force the scrollbar */
            padding: 15px;
        }

        /* Custom Scrollbar Styling */
        #upgrade-list::-webkit-scrollbar { width: 10px; }
        #upgrade-list::-webkit-scrollbar-track { background: #16191c; }
        #upgrade-list::-webkit-scrollbar-thumb { 
            background: var(--primary); 
            border-radius: 5px;
        }

        .upgrade-card {
            background: var(--card);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .upgrade-card:hover:not(.disabled) {
            transform: scale(1.02);
            background: #3e4451;
            border-color: var(--secondary);
            cursor: pointer;
        }

        .upgrade-card.disabled {
            opacity: 0.4;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .info { flex: 1; }
        .name { font-weight: bold; color: var(--secondary); font-size: 1.1rem; }
        .cost { color: var(--accent); font-weight: bold; }
        .count { font-size: 1.5rem; margin-left: 15px; opacity: 0.5; }

        /* HUD */
        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
        }
        .score { font-size: 3rem; color: var(--secondary); text-shadow: 3px 3px 0px #000; }

        /* Effects */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.7s forwards;
        }
        @keyframes explode {
            to { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    </div>

    <div id="shop">

        <div id="upgrade-list"></div>
    </div>
