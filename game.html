<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Endless Runner</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
    }
    canvas {
        display: block;
        margin: auto;
        background: #222;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 50,
    y: 200,
    width: 40,
    height: 40,
    dy: 0,
    gravity: 0.8,
    jumpPower: -12,
    grounded: true
};

let obstacles = [];
let speed = 5;
let score = 0;
let gameOver = false;

// Controls
document.addEventListener("keydown", e => {
    if (e.code === "Space" && player.grounded && !gameOver) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }
    if (e.code === "Space" && gameOver) {
        resetGame();
    }
});

function spawnObstacle() {
    let height = 30 + Math.random() * 40;
    obstacles.push({
        x: canvas.width,
        y: canvas.height - height,
        width: 20,
        height: height
    });
}

function resetGame() {
    obstacles = [];
    speed = 5;
    score = 0;
    gameOver = false;
    player.y = 200;
    player.dy = 0;
}

function update() {
    if (gameOver) return;

    // Player physics
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= 200) {
        player.y = 200;
        player.dy = 0;
        player.grounded = true;
    }

    // Obstacles
    if (Math.random() < 0.02) spawnObstacle();

    obstacles.forEach((obs, i) => {
        obs.x -= speed;

        // Collision
        if (
            player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y
        ) {
            gameOver = true;
        }

        // Remove off-screen
        if (obs.x + obs.width < 0) {
            obstacles.splice(i, 1);
            score++;
        }
    });

    // Increase difficulty
    speed += 0.002;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ground
    ctx.fillStyle = "#555";
    ctx.fillRect(0, 240, canvas.width, 5);

    // Player
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Obstacles
    ctx.fillStyle = "#ff4444";
    obstacles.forEach(obs => {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    });

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 300, 120);
        ctx.font = "16px Arial";
        ctx.fillText("Press SPACE to restart", 300, 150);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
