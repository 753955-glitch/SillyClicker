<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Clicker</title>
    <style>
        /* Comic Sans for maximum silliness */
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background-color: #fff4e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* Prevents highlighting the text while clicking fast */
            overflow: hidden;
        }

        h1 {
            color: #ff6600;
            font-size: 3rem;
            margin-bottom: 0;
        }

        /* The smiley is now the "button" itself to ensure clicks always register */
        #smiley {
            font-size: 150px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.05s;
            outline: none;
            padding: 20px;
            display: block;
        }

        #smiley:active {
            transform: scale(0.9) rotate(-5deg);
        }

        .stats {
            font-size: 2.5rem;
            margin: 10px 0;
            font-weight: bold;
            color: #333;
        }

        #gps-display {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* The Upgrade Button */
        #buy-upgrade {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        #buy-upgrade:hover:not(:disabled) {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        #buy-upgrade:disabled {
            background-color: #bbb;
            cursor: not-allowed;
            opacity: 0.7;
        }

        p {
            font-size: 1.1rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Silly Clicker</h1>
    
    <button id="smiley" title="Click me!">😊</button>
    
    <div class="stats"><span id="score">0</span> Giggles</div>
    <div id="gps-display">Giggles Per Second: 0</div>

    <p>Need more laughs? Get a <strong>Tickle Feather</strong></p>
    <button id="buy-upgrade">Cost: 10 Giggles</button>

    <script>
        let giggles = 0;
        let ticklers = 0;
        let upgradeCost = 10;

        const scoreDisplay = document.getElementById('score');
        const gpsDisplay = document.getElementById('gps-display');
        const smileyBtn = document.getElementById('smiley');
        const upgradeBtn = document.getElementById('buy-upgrade');

        // Logic for clicking the smiley
        smileyBtn.onclick = function() {
            giggles++;
            updateUI();
        };
