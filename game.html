<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dodge</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            background-color: #000;
            cursor: none;
        }
        h1 { margin-bottom: 10px; text-shadow: 2px 2px #ff0055; }
        .info { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <h1>NEON DODGE</h1>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="info">Move your mouse/finger to dodge!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game Variables
        let score = 0;
        let gameOver = false;
        let gameSpeed = 5;
        
        const player = {
            x: 200,
            y: 450,
            size: 20,
            color: "#00f2ff"
        };

        const enemies = [];
        const enemyFrequency = 0.02;

        // Track Mouse/Touch Position
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size / 2;
        });

        function spawnEnemy() {
            if (Math.random() < enemyFrequency + (score / 5000)) {
                const size = Math.random() * 30 + 15;
                enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    size: size,
                    speed: Math.random() * 3 + gameSpeed
                });
            }
        }

        function update() {
            if (gameOver) return;

            // Move enemies
            for (let i = 0; i < enemies.length; i++) {
                enemies[i].y += enemies[i].speed;

                // Collision Detection
                if (
                    player.x < enemies[i].x + enemies[i].size &&
                    player.x + player.size > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].size &&
                    player.y + player.size > enemies[i].y
                ) {
                    gameOver = true;
                }

                // Remove off-screen enemies and add score
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    gameSpeed += 0.05; // Make it harder
                    i--;
                }
            }

            spawnEnemy();
        }

        function draw() {
            // Clear Canvas
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player
