<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Clicker ⚡</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #1e1e2f, #2c2c54);
    color: white;
    user-select: none;
}

#orb {
    font-size: 100px;
    cursor: pointer;
    margin: 20px;
}

.shopTab {
    display: none;
    width: 320px;
    height: 260px;
    margin: auto;
    overflow-y: auto;
    border: 2px solid #555;
    border-radius: 10px;
    background: #222;
}

.upgrade {
    background: #444;
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.upgrade:hover {
    background: #666;
}

.tabs button {
    margin: 5px;
    padding: 8px;
}

.float {
    position: absolute;
    color: yellow;
    animation: floatUp 1s forwards;
}

@keyframes floatUp {
    to { transform: translateY(-60px); opacity: 0; }
}
</style>
</head>

<body>

<h1>Chaos Clicker ⚡</h1>

<div id="score"></div>
<div id="eps"></div>

<div id="orb">⚡</div>

<div class="tabs">
<button onclick="openTab('buildings')">Buildings</button>
<button onclick="openTab('upgrades')">Upgrades</button>
</div>

<div id="buildings" class="shopTab">
<div class="upgrade" onclick="buyGen()">Generator (<span id="genCost"></span>)</div>
</div>

<div id="upgrades" class="shopTab">
<div class="upgrade" onclick="buyClick()">Click Power (<span id="clickCost"></span>)</div>
</div>

<script>
// ===== DATA =====
let energy = 0;
let clickPower = 1;
let generators = 0;

let genCost = 50;
let clickCost = 25;

// ===== SAFE SOUND FUNCTION =====
function playSound(url) {
    try {
        let s = new Audio(url);
        s.volume = 0.3;
        s.play().catch(() => {});
    } catch {}
}

// ===== UPDATE =====
function getEPS() {
    return generators;
}

function update() {
    document.getElementById("score").innerText = "Energy: " + Math.floor(energy);
    document.getElementById("eps").innerText = "EPS: " + getEPS();

    document.getElementById("genCost").innerText = Math.floor(genCost);
    document.getElementById("clickCost").innerText = Math.floor(clickCost);
}

// ===== CLICK FIXED =====
document.getElementById("orb").addEventListener("click", function(e) {
    let gain = clickPower;
    energy += gain;

    floatText("+" + gain, e.clientX, e.clientY);

    playSound("https://www.myinstants.com/media/sounds/mouse-click.mp3");

    update();
});

// ===== FLOAT =====
function floatText(text, x, y) {
    let el = document.createElement("div");
    el.className = "float";
    el.innerText = text;
    el.style.left = x + "px";
    el.style.top = y + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

// ===== UPGRADES =====
function buyGen() {
    if (energy >= genCost) {
        energy -= genCost;
        generators++;
        genCost *= 1.5;

        playSound("https://www.myinstants.com/media/sounds/cash-register.mp3");

        update();
    }
}

function buyClick() {
    if (energy >= clickCost) {
        energy -= clickCost;
        clickPower++;
        clickCost *= 1.4;

        playSound("https://www.myinstants.com/media/sounds/cash-register.mp3");

        update();
    }
}

// ===== PASSIVE =====
setInterval(() => {
    energy += getEPS();
    update();
}, 1000);

// ===== TABS =====
function openTab(name) {
    document.querySelectorAll(".shopTab").forEach(t => t.style.display = "none");
    document.getElementById(name).style.display = "block";
}

// init
openTab('buildings');
update();
</script>

</body>
</html>
