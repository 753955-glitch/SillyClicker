<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOSE CLICKER DELUXE</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Left Side */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #16213e, #1a1a2e);
        }

        #goose {
            font-size: 150px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        #goose:active { transform: scale(0.9); }

        /* Right Side Shop */
        #shop {
            width: 350px;
            background-color: #0f3460;
            border-left: 4px solid #e94560;
            display: flex;
            flex-direction: column;
        }

        #shop-header {
            background-color: #e94560;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        #upgrade-list {
            flex: 1;
            overflow-y: auto; /* Enables scrolling */
            padding: 10px;
        }

        .upgrade-button {
            background-color: #16213e;
            border: 2px solid #e94560;
            color: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
        }

        .upgrade-button:hover:not(:disabled) { background-color: #0f3460; }
        .upgrade-button:disabled { opacity: 0.4; cursor: not-allowed; border-color: #555; }

        .upg-name { font-weight: bold; font-size: 16px; color: #f9d342; }
        .upg-cost { font-size: 14px; color: #4ade80; }

        #stats { position: absolute; top: 20px; left: 20px; }
        .big-honks { font-size: 48px; font-weight: bold; color: #f9d342; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="stats">
            <div class="big-honks" id="honk-count">0</div>
            <div id="hps-text">Honks Per Second: 0</div>
            <div id="hpc-text">Per Click: 1</div>
        </div>
        <div id="goose">🪿</div>
    </div>

    <div id="shop">
