<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA GOOSE CLICKER 3000</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #ffa502;
            --accent: #2ed573;
            --bg: #2f3542;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Left Side: The Clicking Zone */
        #click-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 4px solid var(--primary);
            background: radial-gradient(circle, #3f4656 0%, #2f3542 100%);
        }

        #goose {
            font-size: 150px;
            cursor: pointer;
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        #goose:hover { transform: scale(1.1); }
        #goose:active { transform: scale(0.9) rotate(-5deg); }

        /* Right Side: The Shop */
        #shop {
            width: 400px;
            padding: 20px;
            overflow-y: auto;
            background: #1e2124;
        }

        .upgrade-card {
            background: #2f3542;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .upgrade-card:hover:not(.disabled) {
            background: #57606f;
            transform: translateX(5px);
        }

        .upgrade-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-left-color: #747d8c;
        }

        .upgrade-name { font-weight: bold; font-size: 1.1em; color: var(--secondary); }
