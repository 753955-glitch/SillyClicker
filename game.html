<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Clicker ⚡</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #1e1e2f, #2c2c54);
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    #orb {
        font-size: 100px;
        cursor: pointer;
        transition: transform 0.1s;
    }

    #orb:active {
        transform: scale(0.85);
    }

    #score {
        font-size: 28px;
        margin: 20px;
    }

    .upgrade {
        background: #444;
        padding: 10px;
        margin: 10px;
        display: inline-block;
        cursor: pointer;
        border-radius: 8px;
    }

    .upgrade:hover {
        background: #666;
    }

    #eventLog {
        margin-top: 20px;
        font-size: 14px;
        color: #ccc;
    }
</style>
</head>
<body>

<h1>Chaos Clicker ⚡</h1>

<div id="score">Chaos Energy: 0</div>

<div id="orb">⚡</div>

<h2>Upgrades</h2>

<div class="upgrade" onclick="buyClickPower()">
    Stronger Click (+1) - Cost: <span id="clickCost">25</span>
</div>

<div class="upgrade" onclick="buyGenerator()">
    Chaos Generator (+1/sec) - Cost: <span id="genCost">50</span>
</div>

<div class="upgrade" onclick="buyOverload()">
    Overload Boost (x2 passive) - Cost: <span id="overCost">200</span>
</div>

<div id="eventLog">Welcome to chaos...</div>

<script>
let energy = 0;
let clickPower = 1;
let generators = 0;
let passiveMultiplier = 1;

let clickCost = 25;
let genCost = 50;
let overCost = 200;

function update() {
    document.getElementById("score").innerText = "Chaos Energy: " + Math.floor(energy);
    document.getElementById("clickCost").innerText = clickCost;
    document.getElementById("genCost").innerText = genCost;
    document.getElementById("overCost").innerText = overCost;
}

// Clicking
document.getElementById("orb").onclick = () => {
    energy += clickPower;
    update();
};

// Upgrades
function buyClickPower() {
    if (energy >= clickCost) {
        energy -= clickCost;
        clickPower++;
        clickCost = Math.floor(clickCost * 1.5);
        update();
    }
}

function buyGenerator() {
    if (energy >= genCost) {
        energy -= genCost;
        generators++;
        genCost = Math.floor(genCost * 1.6);
        update();
    }
}

function buyOverload() {
    if (energy >= overCost) {
        energy -= overCost;
        passiveMultiplier *= 2;
        overCost = Math.floor(overCost * 2);
        update();
    }
}

// Passive income
setInterval(() => {
    energy += generators * passiveMultiplier;
    update();
}, 1000);

// 🔥 CHAOS EVENTS (the twist)
setInterval(() => {
    let eventChance = Math.random();

    if (eventChance < 0.3) {
        // bonus
        let bonus = Math.floor(Math.random() * 50 + 20);
        energy += bonus;
        log("⚡ CHAOS SURGE! +" + bonus);
    } 
    else if (eventChance < 0.5) {
        // penalty
        let loss = Math.floor(Math.random() * 30 + 10);
        energy = Math.max(0, energy - loss);
        log("💀 Energy leak! -" + loss);
    } 
    else if (eventChance < 0.65) {
        // temporary boost
        clickPower *= 2;
        log("🔥 Click frenzy! (5s)");
        setTimeout(() => {
            clickPower = Math.max(1, Math.floor(clickPower / 2));
            log("Frenzy ended.");
        }, 5000);
    }

    update();
}, 8000);

// Event log
function log(msg) {
    document.getElementById("eventLog").innerText = msg;
}

// Init
update();
</script>

</body>
</html>
