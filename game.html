<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOSE CLICKER: OMNIVERSE EDITION</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: The Goose */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #16213e, #1a1a2e);
            position: relative;
        }

        #goose {
            font-size: 180px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(249, 211, 66, 0.2));
        }

        #goose:active { transform: scale(0.92); }

        #stats { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            pointer-events: none; 
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .big-honks { 
            font-size: 56px; 
            font-weight: bold; 
            color: #f9d342; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
        }

        /* Right Side: The Shop */
        #shop {
            width: 400px;
            background-color: #0f3460;
            border-left: 4px solid #e94560;
            display: flex;
            flex-direction: column;
        }

        #shop-header {
            background-color: #e94560;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #upgrade-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Scrollbar Styling */
        #upgrade-list::-webkit-scrollbar { width: 8px; }
        #upgrade-list::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

        .upgrade-button {
            background-color: #16213e;
            border: 2px solid #e94560;
            color: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            transition: 0.2s;
        }

        .upgrade-button:hover:not(:disabled) { 
            background-color: #1f4068; 
            transform: translateX(-5px); 
        }

        .upgrade-button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            border-color: #444;
        }

        .upg-info { text-align: left; }
        .upg-name { font-weight: bold; font-size: 15px; color: #f9d342; display: block; }
        .upg-desc { font-size: 11px; color: #aaa; display: block; margin-top: 2px; }
        .upg-cost { font-weight: bold; color: #4ade80; font-size: 14px; margin-left: 10px; }
    </style>
</head>

        <div id="goose">🪿</div>
    </div>

    <div id="shop">

        <div id="upgrade-list">
            </div>
    </div>
