<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOSE CLICKER: OMEGA EDITION</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #ffa502;
            --accent: #2ed573;
            --bg: #1e2124;
            --card: #2f3542;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* News Ticker */
        #news-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: calc(100% - 400px);
            background: rgba(0,0,0,0.8);
            padding: 10px;
            color: var(--accent);
            font-style: italic;
            border-top: 2px solid var(--primary);
        }

        /* Left Side: Interaction */
        #click-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2f3542 0%, #000 100%);
        }

        #goose {
            font-size: 180px;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 30px rgba(255,165,2,0.3));
        }

        #goose:active { transform: scale(0.8) rotate(-10deg); }

        /* Right Side: Massive Shop */
        #shop {
            width: 400px;
            background: #16191c;
            display: flex;
            flex-direction: column;
            border-left: 3px solid var(--primary);
        }

        #shop-header {
            padding: 20px;
            background: var(--primary);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #upgrade-list {
            flex: 1;
            overflow-y: scroll;
            padding: 15px;
        }

        /* Custom Scrollbar */
        #upgrade-list::-webkit-scrollbar { width: 8px; }
        #upgrade-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .upgrade-card {
            background: var(--card);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .upgrade-card:hover:not(.disabled) {
            border-color: var(--secondary);
            transform: scale(1.03);
            cursor: pointer;
        }

        .upgrade-card.disabled {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .info { flex: 1; }
        .name { font-weight: bold; color: var(--secondary); }
        .cost { color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        .owned { font-size: 1.5rem; font-weight: bold; opacity: 0.4; margin-left: 10px; }

        /* Stats */
        #stats { position: absolute; top: 20px; left: 20px; }
        .score { font-size: 3.5rem; color: var(--secondary); text-shadow: 3px 3px 0 #000; }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly 0.6s ease-out forwards;
        }
        @keyframes fly { to { transform: translate(var(--x), var(--y)); opacity: 0; } }
