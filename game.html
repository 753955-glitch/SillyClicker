<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Clicker ⚡</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #1e1e2f, #2c2c54);
        color: white;
        overflow: hidden;
        user-select: none; /* ✅ FIX highlight issue */
    }

    #orb {
        font-size: 100px;
        cursor: pointer;
        user-select: none;
    }

    #score, #eps {
        font-size: 24px;
        margin: 10px;
    }

    .upgrade {
        background: #444;
        padding: 10px;
        margin: 10px;
        display: inline-block;
        cursor: pointer;
        border-radius: 8px;
    }

    .upgrade:hover {
        background: #666;
    }

    .spark {
        position: absolute;
        color: yellow;
        font-size: 20px;
        pointer-events: none;
        animation: floatUp 0.6s ease-out forwards;
    }

    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }
</style>
</head>
<body>

<h1>Chaos Clicker ⚡</h1>

<div id="score">Chaos Energy: 0</div>
<div id="eps">Energy/sec: 0</div>

<div id="orb">⚡</div>

<h2>Upgrades</h2>

<div class="upgrade" onclick="buyClickPower()">
    Stronger Click (+1) - Cost: <span id="clickCost">25</span>
</div>

<div class="upgrade" onclick="buyGenerator()">
    Generator (+1/sec) - Cost: <span id="genCost">50</span>
</div>

<div class="upgrade" onclick="buyFactory()">
    Factory (+5/sec) - Cost: <span id="factoryCost">250</span>
</div>

<div class="upgrade" onclick="buyMegaClick()">
    Mega Click (+10 click) - Cost: <span id="megaCost">500</span>
</div>

<div class="upgrade" onclick="buyAutoBoost()">
    Auto Booster (x2 generators) - Cost: <span id="boostCost">800</span>
</div>

<div class="upgrade" onclick="activateStorm()">
    Storm Mode (x3 ALL for 10s) - Cost: <span id="stormCost">1000</span>
</div>

<script>
let energy = 0;

// stats
let clickPower = 1;
let generators = 0;
let factories = 0;
let generatorBoost = 1;

// costs
let clickCost = 25;
let genCost = 50;
let factoryCost = 250;
let megaCost = 500;
let boostCost = 800;
let stormCost = 1000;

let stormActive = false;

function getEPS() {
    let base = (generators * 1 + factories * 5) * generatorBoost;
    return stormActive ? base * 3 : base;
}

function update() {
    document.getElementById("score").innerText = "Chaos Energy: " + Math.floor(energy);
    document.getElementById("eps").innerText = "Energy/sec: " + getEPS();

    document.getElementById("clickCost").innerText = clickCost;
    document.getElementById("genCost").innerText = genCost;
    document.getElementById("factoryCost").innerText = factoryCost;
    document.getElementById("megaCost").innerText = megaCost;
    document.getElementById("boostCost").innerText = boostCost;
    document.getElementById("stormCost").innerText = stormCost;
}

// spark
function createSpark(x, y) {
    let spark = document.createElement("div");
    spark.className = "spark";
    spark.innerText = "⚡";

    spark.style.left = x + "px";
    spark.style.top = y + "px";

    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 600);
}

// click
document.getElementById("orb").onclick = (e) => {
    let power = stormActive ? clickPower * 3 : clickPower;
    energy += power;
    update();
    createSpark(e.clientX, e.clientY);
};

// upgrades
function buyClickPower() {
    if (energy >= clickCost) {
        energy -= clickCost;
        clickPower++;
        clickCost = Math.floor(clickCost * 1.5);
        update();
    }
}

function buyGenerator() {
    if (energy >= genCost) {
        energy -= genCost;
        generators++;
        genCost = Math.floor(genCost * 1.6);
        update();
    }
}

function buyFactory() {
    if (energy >= factoryCost) {
        energy -= factoryCost;
        factories++;
        factoryCost = Math.floor(factoryCost * 1.7);
        update();
    }
}

function buyMegaClick() {
    if (energy >= megaCost) {
        energy -= megaCost;
        clickPower += 10;
        megaCost = Math.floor(megaCost * 2);
        update();
    }
}

function buyAutoBoost() {
    if (energy >= boostCost) {
        energy -= boostCost;
        generatorBoost *= 2;
        boostCost = Math.floor(boostCost * 2.2);
        update();
    }
}

function activateStorm() {
    if (energy >= stormCost && !stormActive) {
        energy -= stormCost;
        stormActive = true;
        update();

        setTimeout(() => {
            stormActive = false;
            update();
        }, 10000);
    }
}

// passive
setInterval(() => {
    energy += getEPS();
    update();
}, 1000);

// init
update();
</script>

</body>
</html>
