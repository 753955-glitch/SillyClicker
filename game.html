<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOSE CLICKER DELUXE</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Prevents weird scrolling */
        }

        /* Left Side */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #16213e, #1a1a2e);
            position: relative;
        }

        #goose {
            font-size: 150px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            z-index: 10; /* Ensures goose is above background */
        }

        #goose:active { transform: scale(0.9); }

        /* Right Side Shop */
        #shop {
            width: 350px;
            background-color: #0f3460;
            border-left: 4px solid #e94560;
            display: flex;
            flex-direction: column;
        }

        #shop-header {
            background-color: #e94560;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        #upgrade-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .upgrade-button {
            background-color: #16213e;
            border: 2px solid #e94560;
            color: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            width: 100%;
            text-align: left;
        }

        .upgrade-button:hover:not(:disabled) { background-color: #1f4068; }
        .upgrade-button:disabled { opacity: 0.4; cursor: not-allowed; }

        .upg-name { font-weight: bold; font-size: 16px; color: #f9d342; }
        .upg-cost { font-size: 14px; color: #4ade80; }

        #stats { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .big-honks { font-size: 48px; font-weight: bold; color: #f9d342; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="stats">
            <div class="big-honks" id="honk-count">0</div>
            <div id="hps-text">Honks Per Second: 0</div>
            <div id="hpc-text">Per Click: 1</div>
        </div>
        <div id="goose">🪿</div>
    </div>

    <div id="shop">
        <div id="shop-header">UPGRADES</div>
        <div id="upgrade-list">
            <button class="upgrade-button" id="buy-bread">
                <span class="upg-name">Stale Bread</span>
                <span class="upg-cost">Cost: 10 Honks (+1 per click)</span>
            </button>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let honks = 0;
        let perClick = 1;

        // --- ELEMENTS ---
        const goose = document.getElementById('goose');
        const honkDisplay = document.getElementById('honk-count');
        const breadBtn = document.getElementById('buy-bread');

        // --- LOGIC ---
        // This is the part that makes the goose clickable!
        goose.addEventListener('click', () => {
            honks += perClick;
            updateDisplay();
        });

        breadBtn.addEventListener('click', () => {
            if (honks >= 10) {
                honks -= 10;
                perClick += 1;
                updateDisplay();
            }
        });

        function updateDisplay() {
            honkDisplay.innerText = Math.floor(honks);
            document.getElementById('hpc-text').innerText = `Per Click: ${perClick}`;
            
            // Disable button if you can't afford it
            breadBtn.disabled = honks < 10;
        }
    </script>
</body>
</html>
