<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Parkour Game</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: #eee;
    border: 2px solid #000;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// Player
const player = {
    x: 50,
    y: HEIGHT - 100,
    width: 50,
    height: 50,
    dx: 0,
    dy: 0,
    speed: 5,
    jumpPower: 12,
    onGround: false
};

// Gravity
const gravity = 0.6;

// Levels: list of platforms (x, y, width, height)
let levels = [
    [[0, HEIGHT-50, WIDTH, 50], [300, HEIGHT-150, 100, 20]],
    [[0, HEIGHT-50, WIDTH, 50], [200, HEIGHT-120, 100, 20], [400, HEIGHT-200, 150, 20]],
    [[0, HEIGHT-50, WIDTH, 50], [150, HEIGHT-100, 50, 20], [300, HEIGHT-150, 100, 20], [500, HEIGHT-200, 150, 20]]
];

// Generate levels 4-15
for(let i=4; i<=15; i++){
    let plats = [[0, HEIGHT-50, WIDTH, 50]];
    for(let j=1; j<=i+2; j++){
        plats.push([j*100 % 700, HEIGHT-50-j*30, 80, 20]);
    }
    levels.push(plats);
}

let currentLevel = 0;
let platforms = levels[currentLevel];

// Keys
let keys = {};

document.addEventListener("keydown", (e)=>{
    keys[e.code] = true;
});
document.addEventListener("keyup", (e)=>{
    keys[e.code] = false;
});

// Game loop
function gameLoop(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);

    // Movement
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
    if(keys["Space"] && player.onGround){
        player.dy = -player.jumpPower;
        player.onGround = false;
    }

    // Apply gravity
    player.dy += gravity;
    player.y += player.dy;

    // Collision detection
    player.onGround = false;
    for(let plat of platforms){
        if(player.x + player.width > plat[0] && player.x < plat[0]+plat[2] &&
           player.y + player.height > plat[1] && player.y + player.height < plat[1]+plat[3]+player.dy){
            player.y = plat[1] - player.height;
            player.dy = 0;
            player.onGround = true;
        }
    }

    // Draw platforms
    ctx.fillStyle = "green";
    for(let plat of platforms){
        ctx.fillRect(plat[0], plat[1], plat[2], plat[3]);
    }

    // Draw player
    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Level progression
    if(player.x > WIDTH){
        currentLevel++;
        if(currentLevel >= levels.length){
            ctx.fillStyle = "red";
            ctx.font = "60px Arial";
            ctx.fillText("You Win!", WIDTH/2 - 120, HEIGHT/2);
            return; // stop game
        }
        platforms = levels[currentLevel];
        player.x = 50;
        player.y = HEIGHT - player.height - 50;
        player.dy = 0;
    }

    // Keep player in screen
    if(player.x < 0) player.x = 0;
    if(player.y > HEIGHT - player.height){
        player.y = HEIGHT - player.height;
        player.dy = 0;
        player.onGround = true;
    }

    requestAnimationFrame(gameLoop);
}

// Start game
gameLoop();
</script>

</body>
</html>
