<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Clicker</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background-color: #fff4e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: #ffffff;
            padding: 3rem;
            border-radius: 50px;
            box-shadow: 0 20px 0px #ffcc00;
            border: 4px solid #333;
        }

        #smiley {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.05s;
            display: inline-block;
            margin: 20px 0;
        }

        #smiley:active {
            transform: scale(1.3) rotate(-10deg);
        }

        .stats {
            font-size: 2rem;
            margin: 10px 0;
            color: #ff6600;
        }

        #gps-display {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-bottom: 5px solid #2e7d32;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            border-bottom: 2px solid #2e7d32;
            transform: translateY(3px);
        }

        button:disabled {
            background-color: #ccc;
            border-bottom: 5px solid #999;
            cursor: not-allowed;
        }

        .upgrade-section {
            margin-top: 20px;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Silly Clicker</h1>
        <div id="smiley">😊</div>
        <div class="stats"><span id="score">0</span> Giggles</div>
        <div id="gps-display">Giggles Per Second: 0</div>

        <div class="upgrade-section">
            <p>Buy a <strong>Tickle Feather</strong></p>
            <button id="buy-upgrade">Cost: 15 Giggles</button>
        </div>
    </div>

    <script>
        let giggles = 0;
        let ticklers = 0;
        let upgradeCost = 15;

        const scoreDisplay = document.getElementById('score');
        const gpsDisplay = document.getElementById('gps-display');
        const smiley = document.getElementById('smiley');
        const upgradeBtn = document.getElementById('buy-upgrade');

        // Click the smiley
        smiley.addEventListener('click', () => {
            giggles++;
            updateDisplay();
            // Randomly change the face for a split second
            const faces = ['😂', '🤣', '😸', '😊'];
            const randomFace = faces[Math.floor(Math.random() * faces.length)];
            smiley.innerText = randomFace;
            setTimeout(() => { smiley.innerText = '😊'; }, 150);
        });

        // Buy a Tickler
        upgradeBtn.addEventListener('click', () => {
            if (giggles >= upgradeCost) {
                giggles -= upgradeCost;
                ticklers++;
                upgradeCost = Math.round(upgradeCost * 1.4);
                updateDisplay();
            }
        });

        // Passive Giggles logic
        setInterval(() => {
            giggles += ticklers;
            updateDisplay();
        }, 1000);

        function updateDisplay() {
            scoreDisplay.innerText = giggles;
            gpsDisplay.innerText = `Giggles Per Second: ${ticklers}`;
            upgradeBtn.innerText = `Cost: ${upgradeCost}
