<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Clicker</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background-color: #fff4e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 15px 0px #ffcc00;
            border: 4px solid #333;
        }

        /* The Main Clickable Item */
        #smiley {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            margin: 20px 0;
        }

        #smiley:active {
            transform: scale(1.2) rotate(10deg);
        }

        .stats {
            font-size: 2rem;
            margin: 10px 0;
            font-weight: bold;
            color: #ff6600;
        }

        #gps-display {
            font-size: 1.1rem;
            color: #777;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-bottom: 4px solid #2e7d32;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            border-bottom: 1px solid #2e7d32;
            transform: translateY(3px);
        }

        button:disabled {
            background-color: #ccc;
            border-bottom: 4px solid #999;
            cursor: not-allowed;
        }

        .upgrade-section {
            margin-top: 20px;
            border-top: 2px dashed #ddd;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Silly Clicker</h1>
        
        <div id="smiley">😊</div>
        
        <div class="stats"><span id="score">0</span> Giggles</div>
        <div id="gps-display">Giggles Per Second: 0</div>

        <div class="upgrade-section">
            <p>Get a <strong>Tickle Feather</strong></p>
            <button id="buy-upgrade">Cost: 15 Giggles</button>
        </div>
    </div>
