<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Goose Clicker</title>
    <style>
        body {
            background: radial-gradient(circle, #ffefba, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid #f39c12;
        }

        #goose {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        #goose:active {
            transform: scale(0.8) rotate(10deg);
        }

        .stat-box {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #d35400;
        }

        .upgrade-container {
            margin-top: 20px;
            display: grid;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #e67e22; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .floating-text {
            position: absolute;
            color: #e67e22;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Silly Goose Clicker</h1>
        <div id="goose">🪿</div>
        <div class="stat-box">Honks: <span id="count">0</span></div>
        <div id="hps">Honks per second: 0</div>

        <div class="upgrade-container">
            <button id="upg1" onclick="buyUpgrade('auto')">Hire a Gosling (Cost: 10) [+1 HPS]</button>
            <button id="upg2" onclick="buyUpgrade('click')">Sharper Beak (Cost: 50) [+2 per click]</button>
            <button id="upg3" onclick="buyUpgrade('mega')">Honk Megaphone (Cost: 200) [+10 HPS]</button>
        </div>
    </div>

    <script>
        let honks = 0;
        let honksPerClick = 1;
        let honksPerSecond = 0;

        const costs = { auto: 10, click: 50, mega: 200 };
        const goose = document.getElementById('goose');
        const countDisplay = document.getElementById('count');
        const hpsDisplay = document.getElementById('hps');

        // Click Logic
        goose.addEventListener('click', (e) => {
            honks += honksPerClick;
            createFloatingText(e.clientX, e.clientY, `+${honksPerClick}`);
            updateDisplay();
        });

        function buyUpgrade(type) {
            if (honks >= costs[type]) {
                honks -= costs[type];
                
                if (type === 'auto') {
                    honksPerSecond += 1;
                    costs.auto = Math.floor(costs.auto * 1.5);
                    document.getElementById('upg1').innerText = `Hire a Gosling (Cost: ${costs.auto}) [+1 HPS]`;
                } else if (type === 'click') {
                    honksPerClick += 2;
                    costs.click = Math.floor(costs.click * 2);
                    document.getElementById('upg2').innerText = `Sharper Beak (Cost: ${costs.click}) [+2 per click]`;
                } else if (type === 'mega') {
                    honksPerSecond += 10;
                    costs.mega = Math.floor(costs.mega * 1.8);
                    document.getElementById('upg3').innerText = `Honk Megaphone (Cost: ${costs.mega}) [+10 HPS]`;
                }
                updateDisplay();
            }
        }

        function updateDisplay() {
            countDisplay.innerText = Math.floor(honks);
            hpsDisplay.innerText = `Honks per second: ${honksPerSecond}`;
            
            // Disable buttons if can't afford
            document.getElementById('upg1').disabled = honks < costs.auto;
            document.getElementById('upg2').disabled = honks < costs.click;
            document.getElementById('upg3').disabled = honks < costs.mega;
        }

        // Game Loop (Auto-honking)
        setInterval(() => {
            honks += honksPerSecond / 10;
            updateDisplay();
        }, 100);

        // Visual Effects
        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>
